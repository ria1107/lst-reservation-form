<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>プロフィール撮影会 ご予約フォーム | LST</title>
<style>
  :root {
    --bg: #faf9f6;
    --fg: #1a1a1a;
    --muted: #6b6b6b;
    --accent: #b08d57;
    --card: #ffffff;
    --border: #e3ddd2;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14120f;
      --fg: #f2efe9;
      --muted: #a89f8f;
      --accent: #d4af7a;
      --card: #1e1b17;
      --border: #332e26;
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, "Hiragino Sans", "Yu Gothic", sans-serif;
    line-height: 1.7;
  }
  .wrap {
    max-width: 560px;
    margin: 0 auto;
    padding: 40px 20px 80px;
  }
  header {
    text-align: center;
    margin-bottom: 32px;
  }
  header .eyebrow {
    letter-spacing: 0.15em;
    font-size: 12px;
    color: var(--accent);
    text-transform: uppercase;
  }
  header h1 {
    font-size: 22px;
    margin: 8px 0 0;
  }
  form {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
  }
  .field {
    margin-bottom: 20px;
  }
  label {
    display: block;
    font-size: 14px;
    margin-bottom: 6px;
  }
  label .required {
    color: #c0392b;
    margin-left: 4px;
    font-size: 12px;
  }
  input, select, textarea {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: transparent;
    color: var(--fg);
    font-size: 15px;
    font-family: inherit;
  }
  textarea { resize: vertical; min-height: 70px; }
  button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 8px;
    background: var(--accent);
    color: #1a1a1a;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
  }
  button:disabled { opacity: 0.6; cursor: default; }
  #result {
    margin-top: 24px;
    padding: 20px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--card);
    display: none;
  }
  #result a {
    color: var(--accent);
    font-weight: 600;
  }
  #error {
    margin-top: 16px;
    color: #c0392b;
    font-size: 14px;
    display: none;
  }
</style>
</head>
<body>
  <div class="wrap">
    <header>
      <div class="eyebrow">Leading Style Tokyo</div>
      <h1>プロフィール撮影会 ご予約</h1>
    </header>

    <form id="reserveForm">
      <div class="field">
        <label>ご希望の開催日 <span class="required">必須</span></label>
        <input type="date" name="date" required>
      </div>
      <div class="field">
        <label>ご希望の時間枠 <span class="required">必須</span></label>
        <input type="text" name="slot" placeholder="例: 10:00〜12:00" required>
      </div>
      <div class="field">
        <label>お名前 <span class="required">必須</span></label>
        <input type="text" name="name" required>
      </div>
      <div class="field">
        <label>会社名(個人の方は空欄でOK)</label>
        <input type="text" name="company">
      </div>
      <div class="field">
        <label>性別</label>
        <select name="gender">
          <option value="">選択しない</option>
          <option value="女性">女性</option>
          <option value="男性">男性</option>
          <option value="その他">その他</option>
        </select>
      </div>
      <div class="field">
        <label>メールアドレス <span class="required">必須</span></label>
        <input type="email" name="email" required>
      </div>
      <div class="field">
        <label>電話番号</label>
        <input type="tel" name="tel">
      </div>
      <div class="field">
        <label>備考</label>
        <textarea name="note"></textarea>
      </div>

      <!-- スパム対策(見えない項目。人間は入力しない) -->
      <div style="position:absolute; left:-9999px;">
        <label>この項目は入力しないでください</label>
        <input type="text" name="honeypot" tabindex="-1" autocomplete="off">
      </div>

      <button type="submit" id="submitBtn">予約を申し込む</button>
    </form>

    <div id="result"></div>
    <div id="error"></div>
  </div>

<script>
  // GASでWebアプリとして公開したURLに差し替えてください
  const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/【ここにデプロイIDを入れる】/exec';

  const form = document.getElementById('reserveForm');
  const resultBox = document.getElementById('result');
  const errorBox = document.getElementById('error');
  const submitBtn = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorBox.style.display = 'none';
    resultBox.style.display = 'none';

    const data = Object.fromEntries(new FormData(form).entries());

    if (data.honeypot) return; // スパムボット対策(人間には見えない項目に入力があれば無視)

    submitBtn.disabled = true;
    submitBtn.textContent = '送信中...';

    try {
      // text/plain で送ることでブラウザのCORSプリフライトを回避する(GAS Web Appの定番の書き方)
      const res = await fetch(GAS_WEB_APP_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(data),
      });
      const json = await res.json();

      if (json.ok) {
        let html = `<strong>ご予約ありがとうございます。</strong><br>確認メールをお送りしましたのでご確認ください。`;
        if (json.paymentUrl) {
          html += `<br><br><a href="${json.paymentUrl}" target="_blank" rel="noopener">お支払いはこちらから →</a>`;
        }
        resultBox.innerHTML = html;
        resultBox.style.display = 'block';
        form.style.display = 'none';
      } else {
        throw new Error(json.error || '送信に失敗しました');
      }
    } catch (err) {
      errorBox.textContent = '送信できませんでした。お手数ですが時間をおいて再度お試しください。(' + err.message + ')';
      errorBox.style.display = 'block';
      submitBtn.disabled = false;
      submitBtn.textContent = '予約を申し込む';
    }
  });
</script>
</body>
</html>
